<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>2048</title>
<style>
  html,body{margin:0;height:100%;background:#0f1220;color:#e8eaf5;font-family:system-ui,"Malgun Gothic",sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;user-select:none;}
  #score{font-size:20px;font-weight:700;}
  #board{display:grid;grid-template-columns:repeat(4,80px);grid-gap:10px;background:#161a2c;padding:10px;border-radius:12px;
    box-shadow:0 8px 30px rgba(0,0,0,.4);position:relative;}
  .cell{width:80px;height:80px;border-radius:8px;background:#1c2138;display:flex;align-items:center;justify-content:center;
    font-size:26px;font-weight:800;transition:.1s;}
  .hint{color:#9aa0c0;font-size:13px;}
  #over{position:absolute;inset:0;background:rgba(15,18,32,.88);border-radius:12px;display:none;
    align-items:center;justify-content:center;flex-direction:column;font-size:20px;gap:10px;}
</style></head><body>
<div id="score">점수: 0</div>
<div id="board"><div id="over"><div>게임 오버!</div><div class="hint">R 키로 다시 시작</div></div></div>
<div class="hint">방향키로 타일을 밀어 합치세요 (목표: 2048)</div>
<script>
const COL={2:'#3a4066',4:'#4a5088',8:'#6c8cff',16:'#8a7cff',32:'#b06cff',64:'#c85cff',
  128:'#ff8c6b',256:'#ff6b8b',512:'#ffd76b',1024:'#6bffcf',2048:'#6bff8c'};
let grid,score,board=document.getElementById('board'),over=document.getElementById('over');
function reset(){grid=Array.from({length:4},()=>[0,0,0,0]);score=0;add();add();render();over.style.display='none';}
function add(){const e=[];grid.forEach((r,i)=>r.forEach((v,j)=>{if(!v)e.push([i,j]);}));
  if(!e.length)return;const[i,j]=e[(Math.random()*e.length)|0];grid[i][j]=Math.random()<.9?2:4;}
function render(){board.querySelectorAll('.cell').forEach(c=>c.remove());
  document.getElementById('score').textContent='점수: '+score;
  grid.forEach(r=>r.forEach(v=>{const c=document.createElement('div');c.className='cell';
    if(v){c.textContent=v;c.style.background=COL[v]||'#6bff8c';c.style.color=v>4?'#0f1220':'#e8eaf5';}
    board.appendChild(c);}));}
function slide(row){let a=row.filter(v=>v);for(let i=0;i<a.length-1;i++){if(a[i]===a[i+1]){a[i]*=2;score+=a[i];a.splice(i+1,1);}}
  while(a.length<4)a.push(0);return a;}
function rotate(g){return g[0].map((_,i)=>g.map(r=>r[i]).reverse());}
function move(dir){let g=grid.map(r=>[...r]);for(let i=0;i<dir;i++)g=rotate(g);
  g=g.map(slide);for(let i=0;i<(4-dir)%4;i++)g=rotate(g);
  if(JSON.stringify(g)!==JSON.stringify(grid)){grid=g;add();render();checkOver();}}
function checkOver(){for(let i=0;i<4;i++)for(let j=0;j<4;j++){if(!grid[i][j])return;
  if(j<3&&grid[i][j]===grid[i][j+1])return;if(i<3&&grid[i][j]===grid[i+1][j])return;}
  over.style.display='flex';}
document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();
  if(k==='r'){reset();return;}
  if(k==='arrowleft'){e.preventDefault();move(0);}
  else if(k==='arrowup'){e.preventDefault();move(1);}
  else if(k==='arrowright'){e.preventDefault();move(2);}
  else if(k==='arrowdown'){e.preventDefault();move(3);}});
reset();
</script></body></html>
