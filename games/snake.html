<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>스네이크</title>
<style>
  html,body{margin:0;height:100%;background:#0f1220;color:#e8eaf5;font-family:system-ui,"Malgun Gothic",sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;user-select:none;}
  #score{font-size:20px;font-weight:700;}
  canvas{background:#161a2c;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.4);}
  #msg{position:absolute;font-size:18px;text-align:center;background:rgba(15,18,32,.9);padding:20px 30px;border-radius:12px;
    border:1px solid #2a3050;}
  .hint{color:#9aa0c0;font-size:13px;}
</style></head><body>
<div id="score">점수: 0</div>
<canvas id="c" width="400" height="400"></canvas>
<div class="hint">방향키 또는 WASD로 조작</div>
<div id="msg">스페이스바를 눌러 시작</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),G=20,N=cv.width/G;
let snake,dir,next,food,score,alive,started,timer;
function reset(){snake=[{x:10,y:10}];dir={x:0,y:0};next={x:0,y:0};score=0;alive=true;placeFood();draw();
  document.getElementById('score').textContent='점수: 0';}
function placeFood(){do{food={x:(Math.random()*N)|0,y:(Math.random()*N)|0};}while(snake.some(s=>s.x===food.x&&s.y===food.y));}
function start(){reset();started=true;document.getElementById('msg').style.display='none';
  clearInterval(timer);timer=setInterval(tick,110);}
function tick(){if(!alive)return;dir=next;if(dir.x===0&&dir.y===0)return;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.y<0||head.x>=N||head.y>=N||snake.some(s=>s.x===head.x&&s.y===head.y)){return gameOver();}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score++;document.getElementById('score').textContent='점수: '+score;placeFood();}
  else snake.pop();
  draw();}
function draw(){ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#ff6b8b';ctx.beginPath();ctx.arc(food.x*G+G/2,food.y*G+G/2,G/2-2,0,7);ctx.fill();
  snake.forEach((s,i)=>{ctx.fillStyle=i===0?'#6c8cff':'#b06cff';
    ctx.fillRect(s.x*G+1,s.y*G+1,G-2,G-2);});}
function gameOver(){alive=false;started=false;clearInterval(timer);
  const m=document.getElementById('msg');m.innerHTML='게임 오버! 점수 '+score+'<br><span class="hint">스페이스바로 다시 시작</span>';m.style.display='block';}
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k===' '){e.preventDefault();if(!started)start();return;}
  if((k==='arrowup'||k==='w')&&dir.y===0)next={x:0,y:-1};
  else if((k==='arrowdown'||k==='s')&&dir.y===0)next={x:0,y:1};
  else if((k==='arrowleft'||k==='a')&&dir.x===0)next={x:-1,y:0};
  else if((k==='arrowright'||k==='d')&&dir.x===0)next={x:1,y:0};
});
reset();
</script></body></html>
