<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>메모리 카드</title>
<style>
  html,body{margin:0;min-height:100%;background:#0f1220;color:#e8eaf5;font-family:system-ui,"Malgun Gothic",sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;user-select:none;padding:16px;box-sizing:border-box;}
  #hud{font-size:18px;font-weight:700;display:flex;gap:24px;}
  #board{display:grid;grid-template-columns:repeat(4,84px);gap:12px;}
  .card{width:84px;height:84px;border-radius:12px;cursor:pointer;position:relative;transform-style:preserve-3d;
    transition:transform .35s;}
  .card.flip,.card.matched{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:38px;backface-visibility:hidden;}
  .back{background:linear-gradient(135deg,#6c8cff,#b06cff);}
  .front{background:#1c2138;transform:rotateY(180deg);border:1px solid #2a3050;}
  .card.matched .front{opacity:.5;}
  .hint{color:#9aa0c0;font-size:13px;}
  button{background:#1c2138;border:1px solid #2a3050;color:#e8eaf5;padding:9px 16px;border-radius:10px;cursor:pointer;font-size:14px;}
</style></head><body>
<div id="hud"><span>시도: <span id="moves">0</span></span><span>맞춤: <span id="pairs">0</span>/8</span></div>
<div id="board"></div>
<button id="restart">새 게임</button>
<div class="hint">같은 그림 카드 두 장을 찾아 짝을 맞추세요</div>
<script>
const EMOJI=['🐶','🐱','🦊','🐼','🦁','🐸','🐵','🐧'];
let deck,flipped,matched,moves,lock;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function init(){deck=shuffle([...EMOJI,...EMOJI]);flipped=[];matched=0;moves=0;lock=false;
  document.getElementById('moves').textContent=0;document.getElementById('pairs').textContent=0;
  const b=document.getElementById('board');b.innerHTML='';
  deck.forEach((e,i)=>{const c=document.createElement('div');c.className='card';c.dataset.i=i;
    c.innerHTML='<div class="face back">❓</div><div class="face front">'+e+'</div>';
    c.onclick=()=>flip(c);b.appendChild(c);});}
function flip(c){if(lock||c.classList.contains('flip')||c.classList.contains('matched'))return;
  c.classList.add('flip');flipped.push(c);
  if(flipped.length===2){moves++;document.getElementById('moves').textContent=moves;lock=true;
    const[a,b]=flipped;
    if(deck[a.dataset.i]===deck[b.dataset.i]){a.classList.add('matched');b.classList.add('matched');
      matched++;document.getElementById('pairs').textContent=matched;flipped=[];lock=false;
      if(matched===8)setTimeout(()=>alert('🎉 '+moves+'번 만에 클리어!'),300);}
    else setTimeout(()=>{a.classList.remove('flip');b.classList.remove('flip');flipped=[];lock=false;},800);}}
document.getElementById('restart').onclick=init;
init();
</script></body></html>
