<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>방치형 RPG</title>
<style>
  * { box-sizing: border-box; }
  html,body{margin:0;min-height:100%;background:#0d0f1a;color:#e8eaf5;font-family:"Malgun Gothic",system-ui,sans-serif;
    user-select:none;}
  body{display:flex;flex-direction:column;align-items:center;padding:16px;gap:14px;}
  h1{font-size:20px;margin:0;background:linear-gradient(135deg,#6c8cff,#b06cff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .wrap{width:100%;max-width:760px;display:flex;flex-direction:column;gap:12px;}

  /* 상단 플레이어 상태 */
  .stat-row{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;background:#161a2c;border:1px solid #2a3050;
    border-radius:12px;padding:10px 14px;}
  .stat{display:flex;align-items:center;gap:5px;}
  .stat b{color:#fff;}
  .bar-wrap{width:100%;height:14px;background:#0d0f1a;border-radius:7px;overflow:hidden;border:1px solid #2a3050;}
  .bar{height:100%;transition:width .15s;}
  .bar.hp{background:linear-gradient(90deg,#ff6b8b,#ff8ca8);}
  .bar.hp.low{background:linear-gradient(90deg,#ff2d3b,#ff6b6b);animation:pulseLow .6s infinite alternate;}
  @keyframes pulseLow{from{opacity:1;}to{opacity:.5;}}
  .bar.xp{background:linear-gradient(90deg,#6c8cff,#b06cff);}
  .bar.skillxp{background:linear-gradient(90deg,#5ad46a,#8ef29a);}
  .bar-label{font-size:11px;color:#9aa0c0;margin-top:2px;}

  /* 모드 탭 (왼쪽 사이드바) */
  .mode-layout{display:flex;gap:12px;align-items:flex-start;}
  .mode-sidebar{display:flex;flex-direction:column;gap:8px;flex:0 0 92px;position:sticky;top:12px;}
  .mode-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;}
  .mode-window{background:#12162a;border:1px solid #2a3050;border-radius:16px;padding:16px;
    display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,.25);}
  .mode-window[hidden]{display:none;}
  .mode-tab{background:#161a2c;border:1px solid #2a3050;border-radius:12px;padding:12px 6px;text-align:center;
    cursor:pointer;font-size:13px;font-weight:700;transition:.15s;line-height:1.4;}
  .mode-tab:hover{border-color:#6c8cff;}
  .mode-tab.active{background:linear-gradient(135deg,#6c8cff,#b06cff);border-color:transparent;color:#fff;}
  @media (max-width:520px){
    .mode-layout{flex-direction:column;}
    .mode-sidebar{flex-direction:row;flex:none;width:100%;position:static;}
    .mode-sidebar .mode-tab{flex:1;}
  }

  /* 사냥터 선택 */
  .zone-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
  .zone-card{background:#161a2c;border:1px solid #2a3050;border-radius:12px;padding:12px;cursor:pointer;transition:.15s;
    display:flex;flex-direction:column;gap:4px;}
  .zone-card:hover{border-color:#6c8cff;}
  .zone-card.active{border-color:#6c8cff;background:#1c2350;}
  .zone-card.locked{opacity:.45;cursor:not-allowed;}
  .zone-title{font-size:14px;font-weight:700;}
  .zone-desc{font-size:11px;color:#9aa0c0;}

  /* 전투 화면 */
  .arena{display:flex;align-items:center;justify-content:space-around;background:#161a2c;border:1px solid #2a3050;
    border-radius:14px;padding:20px;min-height:220px;position:relative;overflow:hidden;}
  .fighter{display:flex;flex-direction:column;align-items:center;gap:8px;}
  canvas.sprite{image-rendering:pixelated;image-rendering:crisp-edges;width:128px;height:128px;}
  canvas.sprite.boss{width:176px;height:176px;}
  .fighter-name{font-size:13px;font-weight:700;}
  .fighter-hpbar{width:130px;}
  .hit{animation:hit .18s;}
  @keyframes hit{0%{filter:brightness(2) drop-shadow(0 0 8px #fff);transform:scale(1.05);}100%{filter:none;transform:scale(1);}}
  .dead{animation:dead .3s forwards;}
  @keyframes dead{to{opacity:0;transform:translateY(20px) scale(.7);}}
  .vs{font-size:22px;color:#9aa0c0;font-weight:800;}
  .dmg-float{position:absolute;font-weight:800;font-size:15px;color:#ffd76b;pointer-events:none;
    animation:floatup .7s ease-out forwards;}
  @keyframes floatup{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-36px);}}
  .stage-badge{position:absolute;top:10px;left:14px;font-size:12px;background:#0d0f1a;border:1px solid #2a3050;
    padding:4px 10px;border-radius:8px;color:#9aa0c0;}

  .combat-control{display:flex;justify-content:center;}
  .combat-toggle-btn{background:linear-gradient(135deg,#6c8cff,#b06cff);border:none;color:#fff;font-weight:700;
    font-size:14px;padding:12px 32px;border-radius:12px;cursor:pointer;transition:.15s;}
  .combat-toggle-btn:hover{filter:brightness(1.1);}
  .combat-toggle-btn.stop{background:#1c2138;border:1px solid #ff6b8b;color:#ff6b8b;}

  /* 스킬 패널 */
  .skill-panel{background:#161a2c;border:1px solid #2a3050;border-radius:14px;padding:22px;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:10px;}
  .skill-icon{font-size:48px;}
  .skill-title{font-size:16px;font-weight:700;}
  .skill-sub{font-size:12px;color:#9aa0c0;}
  .skill-progress-wrap{width:100%;max-width:280px;height:10px;background:#0d0f1a;border-radius:6px;overflow:hidden;border:1px solid #2a3050;}
  .skill-progress{height:100%;background:linear-gradient(90deg,#5ad46a,#8ef29a);width:0%;transition:width .1s linear;}

  /* 상점 */
  .section-label{font-size:14px;font-weight:700;color:#9aa0c0;margin:2px 2px -2px;}
  .shop{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .upg{background:#161a2c;border:1px solid #2a3050;border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:6px;
    cursor:pointer;transition:.15s;}
  .upg:hover{border-color:#6c8cff;}
  .upg:active{transform:scale(.97);}
  .upg.disabled{opacity:.45;cursor:not-allowed;}
  .upg-head{display:flex;justify-content:space-between;font-size:14px;font-weight:700;}
  .upg-desc{font-size:12px;color:#9aa0c0;}
  .upg-cost{font-size:13px;color:#ffd76b;font-weight:700;}
  .upg.owned{border-color:#5ad46a;opacity:.7;cursor:default;}
  .upg.equipped{border-color:#5ad46a;background:#16241c;}

  /* 인벤토리 */
  .inv-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
  .inv-item{background:#161a2c;border:1px solid #2a3050;border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:5px;font-size:12px;}
  .inv-item .inv-name{font-weight:700;font-size:13px;}
  .inv-item button{background:#6c8cff;border:none;color:#fff;font-size:11px;font-weight:700;padding:5px 8px;border-radius:7px;cursor:pointer;}
  .inv-item button:disabled{background:#2a3050;color:#565c7a;cursor:not-allowed;}
  .equip-summary{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:#9aa0c0;}
  .equip-summary span b{color:#e8eaf5;}

  /* 물약 인벤토리 바 */
  .potion-bar{display:flex;gap:8px;flex-wrap:wrap;}
  .potion-item{display:flex;align-items:center;gap:8px;background:#161a2c;border:1px solid #2a3050;border-radius:10px;
    padding:8px 12px;font-size:13px;}
  .potion-item .p-count{color:#9aa0c0;}
  .potion-item button{background:#6c8cff;border:none;color:#fff;font-size:12px;font-weight:700;padding:6px 10px;
    border-radius:8px;cursor:pointer;}
  .potion-item button:disabled{background:#2a3050;color:#565c7a;cursor:not-allowed;}

  /* 게임 오버 오버레이 */
  .overlay{position:fixed;inset:0;background:rgba(6,8,16,.92);z-index:200;display:flex;align-items:center;justify-content:center;}
  .overlay[hidden]{display:none;}
  .overlay-box{background:#161a2c;border:1px solid #2a3050;border-radius:16px;padding:32px 36px;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:10px;max-width:320px;}
  .overlay-emoji{font-size:48px;}
  .overlay-box h2{margin:0;font-size:22px;}
  .overlay-stats{font-size:14px;color:#9aa0c0;display:flex;flex-direction:column;gap:4px;margin:8px 0;}
  .overlay-stats b{color:#fff;}
  .overlay-box .btn-restart{margin-top:6px;background:linear-gradient(135deg,#6c8cff,#b06cff);border:none;color:#fff;
    font-weight:700;font-size:14px;padding:11px 20px;border-radius:10px;cursor:pointer;}

  .muted-label{font-size:11px;color:#565c7a;font-weight:400;}

  /* 자동 수금 */
  .autogold-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
  .autogold-card{background:#161a2c;border:1px solid #2a3050;border-radius:12px;padding:11px;
    display:flex;flex-direction:column;gap:5px;}
  .autogold-card .ag-title{font-size:13px;font-weight:700;}
  .autogold-card .ag-desc{font-size:11px;color:#9aa0c0;line-height:1.4;}
  .autogold-card .ag-rate{font-size:11px;color:#6c8cff;font-weight:700;}
  .autogold-card button{background:linear-gradient(135deg,#6c8cff,#b06cff);border:none;color:#fff;font-weight:700;
    font-size:12px;padding:8px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;margin-top:2px;width:100%;}
  .autogold-card button:disabled{background:#2a3050;color:#565c7a;cursor:not-allowed;}
  .autogold-card button.ready{animation:readyPulse .8s infinite alternate;}
  @keyframes readyPulse{from{box-shadow:0 0 0 0 rgba(108,140,255,.6);}to{box-shadow:0 0 0 9px rgba(108,140,255,0);}}
  .autogold-card button.agBtn-auto{background:transparent;border:1px solid #2a3050;color:#9aa0c0;font-weight:600;}
  .autogold-card button.agBtn-auto:hover:not(:disabled){border-color:#6c8cff;color:#e8eaf5;}
  .autogold-card button.agBtn-auto:disabled{background:transparent;border-color:#20243c;color:#4a5070;}

  /* 로그 */
  .log{background:#10131f;border:1px solid #2a3050;border-radius:12px;padding:10px 14px;height:100px;
    overflow-y:auto;font-size:12.5px;color:#9aa0c0;display:flex;flex-direction:column-reverse;gap:3px;}
  .log b{color:#e8eaf5;}

  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1c2138;border:1px solid #6c8cff;
    padding:14px 22px;border-radius:12px;font-size:14px;text-align:center;z-index:99;box-shadow:0 8px 30px rgba(0,0,0,.5);
    animation:toastIn .25s;}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px);}to{opacity:1;transform:translate(-50%,0);}}

  /* 전체 능력치 요약 */
  .stat-sheet{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
  .stat-card{background:#161a2c;border:1px solid #2a3050;border-radius:12px;padding:11px;}
  .stat-card-head{font-size:12.5px;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:6px;}
  .stat-card-value{font-size:16px;font-weight:800;color:#6c8cff;white-space:nowrap;}
  .stat-card-breakdown{font-size:10.5px;color:#9aa0c0;margin-top:5px;line-height:1.6;}

  /* 오른쪽 스킬 현황 패널 (넓은 화면: 오른쪽 고정 / 좁은 화면: 아래로 이어붙임) */
  .page-layout{display:flex;gap:20px;align-items:flex-start;justify-content:center;width:100%;}
  .side-panel{flex:0 0 260px;display:flex;flex-direction:column;gap:10px;position:sticky;top:16px;
    max-height:calc(100vh - 32px);overflow-y:auto;}
  #sidePanelSkills{display:flex;flex-direction:column;gap:10px;}
  .side-panel-label{font-size:13px;font-weight:700;color:#9aa0c0;}
  .side-skill-card{background:#161a2c;border:1px solid #2a3050;border-radius:12px;padding:11px 13px;cursor:pointer;transition:.15s;}
  .side-skill-card:hover{border-color:#6c8cff;}
  .side-skill-card.active{border-color:#6c8cff;background:#1c2350;}
  .side-skill-head{font-size:13px;font-weight:700;display:flex;justify-content:space-between;}
  .side-skill-sub{font-size:11px;color:#9aa0c0;margin-top:4px;line-height:1.5;}
  .side-skill-bar-wrap{height:6px;background:#0d0f1a;border-radius:4px;overflow:hidden;margin-top:6px;border:1px solid #2a3050;}
  .side-skill-bar{height:100%;background:linear-gradient(90deg,#5ad46a,#8ef29a);}
  @media (min-width:1081px){ .side-panel .stat-sheet{grid-template-columns:1fr;} }
  @media (max-width:1080px){
    .page-layout{flex-direction:column;}
    .side-panel{flex:none;width:100%;position:static;max-height:none;overflow-y:visible;}
  }
</style></head>
<body>
<h1>⚔️ 방치형 RPG</h1>
<div class="page-layout">
<div class="wrap">
  <div class="stat-row">
    <div class="stat">Lv.<b id="lvl">1</b></div>
    <div class="stat">💰 <b id="gold">0</b></div>
    <div class="stat">⚔️ <b id="atkStat">0</b></div>
    <div class="stat">❤️ <b id="hpStat">0</b></div>
    <div class="stat">⚡ <b id="spdStat">0</b>/초</div>
    <div class="stat">🔮 <b id="rpStat">0</b></div>
  </div>
  <div>
    <div class="bar-wrap"><div id="xpBar" class="bar xp" style="width:0%"></div></div>
    <div class="bar-label">경험치 <span id="xpText">0/0</span></div>
  </div>

  <div class="mode-layout">
    <div class="mode-sidebar" id="modeTabs"></div>
    <div class="mode-content">

      <div id="combatSection" class="mode-window">
        <div class="section-label">🗺️ 사냥터</div>
        <div class="zone-list" id="zoneList"></div>

        <div class="arena" id="arena">
          <div class="stage-badge" id="stageBadge">-</div>
          <div class="fighter">
            <canvas id="heroCanvas" class="sprite" width="32" height="32"></canvas>
            <div class="fighter-name">용사</div>
            <div class="bar-wrap fighter-hpbar"><div id="heroHpBar" class="bar hp" style="width:100%"></div></div>
          </div>
          <div class="vs">VS</div>
          <div class="fighter">
            <canvas id="enemyCanvas" class="sprite" width="32" height="32"></canvas>
            <div class="fighter-name" id="enemyName">-</div>
            <div class="bar-wrap fighter-hpbar"><div id="enemyHpBar" class="bar hp" style="width:100%"></div></div>
          </div>
        </div>

        <div class="combat-control">
          <button id="combatToggleBtn" class="combat-toggle-btn">⚔️ 전투 시작</button>
        </div>

        <div class="potion-bar" id="potionBar"></div>

        <div class="section-label">⚔️ 강화 상점</div>
        <div class="shop" id="shop"></div>

        <div class="section-label">🧪 물약 상점</div>
        <div class="shop" id="potionShop"></div>
      </div>

      <div id="gatherSection" class="mode-window" hidden>
        <div id="skillPanel" class="skill-panel"></div>
        <div class="section-label">🎒 채집한 재료</div>
        <div class="inv-list" id="materialInvList"></div>
      </div>

      <div id="smithingSection" class="mode-window" hidden>
        <div class="section-label">🛡️ 장비</div>
        <div class="equip-summary" id="equipSummary"></div>
        <div class="inv-list" id="gearInvList"></div>

        <div class="section-label">🔨 대장간 <span class="muted-label">(광물 + 골드로 제작)</span></div>
        <div class="shop" id="forgeList"></div>
      </div>

      <div id="alchemySection" class="mode-window" hidden>
        <div class="section-label">🪶 부활의 깃털 <span class="muted-label">(사망 시 자동 사용, 없으면 환생)</span></div>
        <div class="shop" id="alchemyList"></div>

        <div class="section-label">🧪 크리티컬 물약 <span class="muted-label">(제작마다 즉시 +5%, 영구 누적)</span></div>
        <div class="shop" id="critPotionList"></div>
      </div>

    </div>
  </div>

  <div class="section-label">⏳ 자동 수금</div>
  <div id="autoGoldList" class="autogold-list"></div>

  <div class="section-label">🔮 환생</div>
  <div id="rebirthNowCard" class="autogold-card"></div>

  <div class="section-label">🔮 환생 상점 <span class="muted-label">(환생해도 유지됨)</span></div>
  <div class="shop" id="prestigeShop"></div>

  <div class="log" id="log"></div>
</div>

<div class="side-panel" id="sidePanel">
  <div id="sidePanelSkills"></div>
  <div class="section-label">📋 전체 능력치</div>
  <div class="stat-sheet" id="statSheet"></div>
</div>
</div>

<div id="gameOverOverlay" class="overlay" hidden>
  <div class="overlay-box">
    <div class="overlay-emoji">💀</div>
    <h2>게임 오버</h2>
    <div class="overlay-stats">
      <div>도달 지점 <b id="goStage"></b></div>
      <div>레벨 <b id="goLevel"></b></div>
      <div>보유 골드 <b id="goGold"></b></div>
      <div>🔮 획득한 환생 포인트 <b id="goRP"></b></div>
      <div>🔮 누적 환생 포인트 <b id="goRPTotal"></b></div>
    </div>
    <button id="goRestart" class="btn-restart">🔮 환생하기</button>
  </div>
</div>

<script>
/* ========================= 픽셀아트 스프라이트 (캔버스 도트 드로잉) ========================= */
function px(ctx,x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }

function drawHero(ctx){
  ctx.clearRect(0,0,32,32);
  const skin='#ffd9a0', helm='#4a6fdc', helmDark='#33499e', plume='#ff6b6b',
        armor='#5c7cf0', armorDark='#3d54b8', trim='#e8ecff', leg='#2b3050', boot='#1a1a2e', eye='#1a1a2e';
  px(ctx,8,29,16,2,'#00000055');
  px(ctx,11,23,4,6,leg); px(ctx,17,23,4,6,leg);
  px(ctx,10,28,6,3,boot); px(ctx,16,28,6,3,boot);
  px(ctx,7,14,3,9,armorDark); px(ctx,22,14,3,9,armorDark);
  px(ctx,7,21,3,3,skin); px(ctx,22,21,3,3,skin);
  px(ctx,9,13,14,9,armor);
  px(ctx,9,13,14,2,trim);
  px(ctx,9,20,14,2,trim);
  px(ctx,14,15,4,5,armorDark);
  px(ctx,12,9,8,5,skin);
  px(ctx,13,11,2,1,eye); px(ctx,17,11,2,1,eye);
  px(ctx,10,3,12,3,helm);
  px(ctx,9,6,14,4,helm);
  px(ctx,9,6,14,1,trim);
  px(ctx,14,1,4,3,plume);
  px(ctx,11,9,2,2,helmDark); px(ctx,19,9,2,2,helmDark);
}

function drawSlime(ctx,t){
  ctx.clearRect(0,0,32,32);
  const body='#5ad46a', dark='#3aa64a', light='#8ef29a', eye='#12291a';
  const bounce = t? Math.sin(t/220)*2 : 0;
  const y = 14+bounce;
  px(ctx,10,26,12,3,'#00000040');
  px(ctx,8,y,16,12,body);
  px(ctx,6,y+4,20,8,body);
  px(ctx,6,y+8,20,4,dark);
  px(ctx,10,y+2,6,4,light);
  px(ctx,11,y+6,2,2,eye); px(ctx,19,y+6,2,2,eye);
}

function drawBat(ctx,t){
  ctx.clearRect(0,0,32,32);
  const body='#6b4a9e', dark='#4a2f78', wing='#8a63c9', eye='#ff6b6b';
  const flap = t? Math.sin(t/110)*6 : 0;
  px(ctx,12,26,8,2,'#00000040');
  px(ctx,4,10-flap*0.3,10,7,wing);
  px(ctx,18,10-flap*0.3,10,7,wing);
  px(ctx,11,8,10,10,body);
  px(ctx,9,6,5,4,dark); px(ctx,18,6,5,4,dark);
  px(ctx,13,12,2,2,eye); px(ctx,17,12,2,2,eye);
}

function drawSkeleton(ctx){
  ctx.clearRect(0,0,32,32);
  const bone='#e9e6d8', dark='#b7b3a0', eye='#ff6b6b';
  px(ctx,10,29,12,2,'#00000040');
  px(ctx,12,22,3,7,bone); px(ctx,17,22,3,7,bone);
  px(ctx,10,13,12,9,bone);
  px(ctx,11,15,10,1,dark); px(ctx,11,18,10,1,dark);
  px(ctx,7,14,3,8,bone); px(ctx,22,14,3,8,bone);

function materialSellPrice(key){

function skillXpToNext(level){ return Math.round(15*Math.pow(1.2, level-1)); }

function deriveStats(){
  const p = S.prestige.upLvl;
  S.maxHp = Math.round((S.baseHp + S.upLvl.hp*12 + S.level*2 + p.power*1 + equipBonus('hp')) * (1+p.vitality*0.02));
  S.atk = Math.round((S.baseAtk + S.upLvl.atk*2 + p.power*1 + equipBonus('atk')) * (1+S.level*0.06));
  S.spd = +(S.baseSpd + S.upLvl.spd*0.12).toFixed(2);
  S.goldMult = (1 + S.upLvl.gold*0.001) * (1 + p.wealth*0.005) * (1 + equipBonus('goldPct')/100);
}
function xpToNext(level){ return Math.round(20*Math.pow(1.25, level-1)); }
function upgradeCost(key, lvl){
  const base = {atk:15, hp:15, spd:40, gold:30}[key];
  return Math.round(base*Math.pow(1.16, lvl));
}

let enemy = null;
function enemyStatsFor(stage, isBoss){
  const hpScale = Math.pow(1.16, stage-1);
  const atkScale = Math.pow(1.13, stage-1);
  const rewardScale = Math.pow(1.16, stage-1);
  let hp = Math.round(15*hpScale), atk = Math.round(1.8*atkScale), gold = Math.round(2*rewardScale), xp = Math.round(1.5*rewardScale);
  if(isBoss){ hp=Math.round(hp*6.5); atk=Math.round(atk*2.2); gold=Math.round(gold*6); xp=Math.round(xp*6); }
  return {hp, maxHp:hp, atk, gold, xp};
}
function spawnEnemy(){
  const zone = currentZone();
  const zp = S.zoneProgress[zone.key];
  const effStage = effectiveStage(zone.key);
  const isBoss = zp.killsInZone >= zone.killsToBoss;
  const typeKey = isBoss ? zone.boss : zone.monsterPool[(Math.random()*zone.monsterPool.length)|0];
  const st = enemyStatsFor(effStage, isBoss);
  enemy = {type:typeKey, isBoss, ...st, atkCd:0};
  document.getElementById('enemyName').textContent = (isBoss?'👑 ':'') + SPRITES[typeKey].name;
  enemyCv.classList.toggle('boss', isBoss);
  document.getElementById('stageBadge').textContent = zone.icon+' '+zone.name+' '+zp.subStage+'단계 · '+(isBoss?'보스전!':zp.killsInZone+'/'+zone.killsToBoss);
  renderEnemyHp();
}

  const arena = document.getElementById('arena');

  const box = target.getBoundingClientRect(), abox = arena.getBoundingClientRect();
  el.style.left = (box.left-abox.left+box.width/2-10)+'px';
  el.style.top = (box.top-abox.top-4)+'px';

  setTimeout(()=>el.remove(),700);
}

function gainXp(amount){
  const mult = 1 + S.prestige.upLvl.wisdom*0.005 + equipBonus('xpPct')/100;
  S.xp += Math.round(amount * mult);
  let need = xpToNext(S.level);
  while(S.xp >= need){
    S.xp -= need; S.level++;
    deriveStats(); S.hp = S.maxHp;
    log('✨ <b>레벨업!</b> Lv.'+S.level+' 달성');
    need = xpToNext(S.level);
    renderZones();
  }
}

function playerAttack(){
  if(!enemy) return;
  enemy.hp -= S.atk;
  flash(enemyCv);
  floatDmg(enemyCv, '-'+S.atk, '#ffd76b');
  renderEnemyHp();
  if(enemy.hp <= 0){
    const g = Math.round(enemy.gold*S.goldMult);
    S.gold += g;
    gainXp(enemy.xp);
    log((enemy.isBoss?'👑 <b>보스 '+SPRITES[enemy.type].name+'</b> 처치! ':'<b>'+SPRITES[enemy.type].name+'</b> 처치. ')+'+'+g+'💰 +'+enemy.xp+'xp');
    enemyCv.classList.add('dead');
    const killedZoneKey = S.currentZone;
    setTimeout(()=>{
      enemyCv.classList.remove('dead');
      const zp = S.zoneProgress[killedZoneKey];
      if(enemy && enemy.isBoss){
        zp.subStage++; zp.killsInZone = 0;
        log('🚩 '+zoneByKey(killedZoneKey).name+' '+zp.subStage+'단계 진입!');
      } else {
        zp.killsInZone++;
      }
      if(S.currentZone===killedZoneKey) spawnEnemy();
      renderStats();
    },260);
    renderStats();
  }
}
function enemyAttack(){
  if(!enemy) return;
  S.hp -= enemy.atk;
  flash(heroCv);
  floatDmg(heroCv, '-'+enemy.atk, '#ff6b8b');
  if(S.hp <= 0){
    S.hp = 0;
    if((S.inventory[REVIVAL_ITEM_KEY]||0) > 0){
      S.inventory[REVIVAL_ITEM_KEY]--;
      S.hp = S.maxHp;
      log('🪶 <b>부활의 깃털</b>이 발동! 그 자리에서 부활했습니다.');
      renderHeroHp(); renderInventory(); save();
      return;
    }
    renderHeroHp();
    triggerGameOver();
    return;
  }
  renderHeroHp();
}
const REBIRTH_START_STAGE = 31; // 화산(baseStage 22) 10단계 = 22+10-1
function rebirthPointsFor(stage){
  if(stage < REBIRTH_START_STAGE) return 0;
  return Math.floor((stage-REBIRTH_START_STAGE)/10) + 1;
}
let lastRpEarned = 0;
function triggerGameOver(){
  if(S.gameOver) return;
  S.gameOver = true;
  const effStage = effectiveStage(S.currentZone);
  lastRpEarned = rebirthPointsFor(effStage);
  S.prestige.points += lastRpEarned;
  log(`💀 용사가 쓰러졌습니다... 🔮 환생 포인트 +${lastRpEarned} 획득!`);
  showGameOverOverlay();
  save();
}
function showGameOverOverlay(){
  const zone = currentZone();

  document.getElementById('goLevel').textContent = S.level;

}

      hp:70, maxHp:70,

      ownedGear:{},
      activeMode:'combat',
      combatActive:false,

    };
    heroCd = 0; lastCombatTick = Date.now(); skillCd = 0;
    deriveStats(); S.hp = S.maxHp;
    document.getElementById('gameOverOverlay').hidden = true;
    document.getElementById('log').innerHTML = '';
    spawnEnemy();

    log(`🔮 환생했습니다! (누적 환생 포인트: ${S.prestige.points})`+(headstartGold>0?` · 시작 골드 +${headstartGold}`:''));
  }catch(e){
    console.error('restartGame 오류:', e);

  }
}

function effectiveCritChance(skillKey){
  const base = GATHER_SKILLS[skillKey].critChance;

function doGatherAction(skillKey){

  let qty = 1, critMsg = '';
  if(Math.random() < effectiveCritChance(skillKey)){ qty = 2; critMsg = ' 🌟크리티컬!'; }
  S.inventory[item.itemKey] = (S.inventory[item.itemKey]||0)+qty;
  sk.xp += item.xp;
  let need = skillXpToNext(sk.level);
  let leveledUp = false;
  while(sk.xp >= need){
    sk.xp -= need; sk.level++; leveledUp = true;
    log(`✨ ${g.icon} <b>${SKILL_NAMES[skillKey]} 레벨업!</b> Lv.${sk.level}`);
    need = skillXpToNext(sk.level);
  }
  log(`${g.icon} ${item.icon} ${item.itemName} +${qty}${critMsg} (경험치 +${item.xp})`);
  if(Math.random() < g.rareChance){
    const bonus = Math.round(10*Math.pow(1.6, g.catalog.indexOf(item)));
    S.gold += bonus;
    log(`${g.rareIcon} <b>${g.rareLabel}</b> 발견! +${bonus}💰`);
    renderStats();
  }
  const cv = document.getElementById(g.canvasId);
  if(cv){ flash(cv); g.draw(cv.getContext('2d'), item.key, true); }
  renderSkillPanel(); renderInventory(); renderSidePanel(); save();
  if(leveledUp) renderSkillPanel();
}
function renderGatherPanel(skillKey){
  const g = GATHER_SKILLS[skillKey];
  const panel = document.getElementById('skillPanel');
  const sk = S.skills[skillKey];
  const item = currentGatherItem(skillKey);
  const need = skillXpToNext(sk.level);
  const pct = Math.max(0, Math.min(100, 100 - (skillCd/item.actionMs*100)));
  const cards = g.catalog.map(t=>{
    const locked = sk.level < t.level;
    const active = S[g.selectedKey]===t.key;
    return `<div class="zone-card"${locked?' style="opacity:.4;cursor:not-allowed;"':''}${active?' style="border-color:#5ad46a;background:#16241c;"':''}
      data-gather="${t.key}">
      <div class="zone-title">${t.icon} ${t.name}</div>
      <div class="zone-desc">${locked? '🔒 Lv.'+t.level+' 필요' : '💰'+t.sellPrice+' · xp'+t.xp}</div>
    </div>`;
  }).join('');
  panel.innerHTML = `
    <canvas id="${g.canvasId}" class="sprite" width="32" height="32" style="width:96px;height:96px;"></canvas>
    <div class="skill-title">${g.icon} ${SKILL_NAMES[skillKey]} Lv.${sk.level} <span class="muted-label">- ${item.name} 채집중</span></div>
    <div class="skill-sub">보유 ${item.itemName} ${S.inventory[item.itemKey]||0}개 · 경험치 ${sk.xp}/${need}</div>
    <div class="skill-progress-wrap"><div class="skill-progress" style="width:${pct}%"></div></div>
    <div class="skill-sub">크리티컬 확률 ${Math.round(effectiveCritChance(skillKey)*100)}% · ${g.rareLabel} 확률 ${Math.round(g.rareChance*100)}%</div>
    <div class="zone-list" style="width:100%;margin-top:6px;">${cards}</div>`;
  panel.querySelectorAll('[data-gather]').forEach(el=>{
    el.style.cursor = 'pointer';
    el.onclick = ()=>selectGatherItem(skillKey, el.dataset.gather);

  const cv = document.getElementById(g.canvasId);

}

function selectZone(key){
  const zone = zoneByKey(key);
  if(S.level < zone.unlockLevel) return;
  if(S.activeMode !== 'combat') setMode('combat');
  if(S.currentZone === key) return;
  S.currentZone = key;
  spawnEnemy();
  renderZones();
  save();
}
function renderZones(){
  const list = document.getElementById('zoneList');
  list.innerHTML = '';
  ZONES.forEach(zone=>{
    const locked = S.level < zone.unlockLevel;
    const active = S.currentZone===zone.key;
    const card = document.createElement('div');
    card.className = 'zone-card'+(locked?' locked':'')+(active?' active':'');
    const zp = S.zoneProgress[zone.key];
    card.innerHTML = `<div class="zone-title">${zone.icon} ${zone.name}</div>

const FORGE_RECIPES = {
  wpn1:{oreKey:'ore_copper',  oreQty:5,  goldCost:50},
  wpn2:{oreKey:'ore_iron',    oreQty:8,  goldCost:400},
  wpn3:{oreKey:'ore_mithril', oreQty:12, goldCost:2000},
  wpn4:{oreKey:'ore_dragon',  oreQty:20, goldCost:9000},
  arm1:{oreKey:'ore_copper',  oreQty:6,  goldCost:50},
  arm2:{oreKey:'ore_iron',    oreQty:10, goldCost:400},
  arm3:{oreKey:'ore_mithril', oreQty:15, goldCost:2000},
  arm4:{oreKey:'ore_dragon',  oreQty:25, goldCost:9000},
  acc1:{oreKey:'ore_silver',  oreQty:8,  goldCost:150},
  acc2:{oreKey:'ore_gold',    oreQty:10, goldCost:800},
  acc3:{oreKey:'ore_rune',    oreQty:15, goldCost:3000},
};
function craftGear(key){
  const item = EQUIPMENT_CATALOG.find(e=>e.key===key);
  const recipe = FORGE_RECIPES[key];
  if(!item || !recipe || S.ownedGear[key]) return;
  const haveOre = S.inventory[recipe.oreKey]||0;
  if(haveOre < recipe.oreQty || S.gold < recipe.goldCost) return;
  S.inventory[recipe.oreKey] -= recipe.oreQty;
  S.gold -= recipe.goldCost;
  S.ownedGear[key] = true;
  if(!S.equipment[item.slot]) S.equipment[item.slot] = key;
  deriveStats(); renderStats(); renderForge(); renderGearInventory(); save();
  log(`🔨 <b>${item.name}</b> 제작 완료!`);
}
function equipGear(key){
  const item = EQUIPMENT_CATALOG.find(e=>e.key===key);
  if(!item || !S.ownedGear[key]) return;
  S.equipment[item.slot] = key;
  deriveStats(); renderStats(); renderInventory(); save();
}
function renderForge(){
  const list = document.getElementById('forgeList');
  if(!list) return;
  list.innerHTML='';
  EQUIPMENT_CATALOG.forEach(item=>{
    const recipe = FORGE_RECIPES[item.key];
    if(!recipe) return;
    const owned = !!S.ownedGear[item.key];
    const haveOre = S.inventory[recipe.oreKey]||0;
    const oreItem = ORES.find(o=>o.itemKey===recipe.oreKey);
    const afford = haveOre>=recipe.oreQty && S.gold>=recipe.goldCost;
    const statText = ['atk','hp','goldPct','xpPct'].filter(k=>item[k])
      .map(k=>({atk:'공격력',hp:'체력',goldPct:'골드%',xpPct:'경험치%'}[k]+' +'+item[k]+(k.includes('Pct')?'%':'')))
      .join(', ');
    const card = document.createElement('div');
    card.className='upg'+(owned?' owned':(afford?'':' disabled'));
    card.innerHTML = `<div class="upg-head"><span>${item.icon} ${item.name}</span></div>
      <div class="upg-desc">[${SLOT_NAMES[item.slot]}] ${statText}</div>
      <div class="upg-desc">${oreItem.icon} ${oreItem.itemName} ${haveOre}/${recipe.oreQty} · 💰${recipe.goldCost.toLocaleString()}</div>
      <div class="upg-cost">${owned?'✅ 보유중':'🔨 제작하기'}</div>`;
    if(!owned) card.onclick = ()=>craftGear(item.key);
    list.appendChild(card);
  });
}

    item.className='potion-item';
    item.innerHTML = `<span>${p.icon} ${p.title}</span><span class="p-count">x${count}</span>
      <button ${count<=0||S.gameOver?'disabled':''}>사용</button>`;
    item.querySelector('button').onclick = ()=>usePotion(p.key);
    bar.appendChild(item);
  });
}

/* ========================= 자동 수금 (여러 금고, 주기가 길어질수록 보상도 커짐) ========================= */
function fmtMMSS(ms){
  const s = Math.max(0, Math.ceil(ms/1000));
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), r = s%60;
  return h>0 ? String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(r).padStart(2,'0')
             : String(m).padStart(2,'0')+':'+String(r).padStart(2,'0');
}
function autoGoldReward(tier){ return Math.round(tier.rewardBase*Math.pow(1.16, effectiveStage(S.currentZone)-1)*S.goldMult); }
function unlockAutoGold(tierKey){
  const tier = AUTO_GOLD_TIERS.find(t=>t.key===tierKey);
  const st = S.autoGold[tierKey];
  if(S.gameOver || !tier || st.unlocked) return;
  if(S.gold < tier.cost) return;
  S.gold -= tier.cost;
  st.unlocked = true;
  st.readyAt = Date.now()+tier.cycleMs;
  log(`⏳ <b>${tier.title}</b>를 해금했습니다! ${fmtMMSS(tier.cycleMs)}마다 골드가 쌓여요.`);
  renderStats(); renderAutoGold(); save();
}
function collectAutoGold(tierKey){
  const tier = AUTO_GOLD_TIERS.find(t=>t.key===tierKey);
  const st = S.autoGold[tierKey];
  if(!tier || !st.unlocked) return;
  if(Date.now() < st.readyAt) return;
  const reward = autoGoldReward(tier);
  S.gold += reward;
  st.readyAt = Date.now()+tier.cycleMs;
  log(`${tier.icon} ${tier.title} +${reward.toLocaleString()}💰`);
  renderStats(); renderAutoGold(); save();
}
function autoClaimCost(tier){ return tier.cost*4; }
function unlockAutoClaim(tierKey){
  const tier = AUTO_GOLD_TIERS.find(t=>t.key===tierKey);
  const st = S.autoGold[tierKey];
  if(!tier || !st.unlocked || st.autoClaim) return;
  const cost = autoClaimCost(tier);
  if(S.gold < cost) return;
  S.gold -= cost;
  st.autoClaim = true;
  log(`🤖 <b>${tier.title}</b> 자동화 완료! 이제 알아서 수금돼요.`);
  renderStats(); renderAutoGold(); save();
}
function autoCollectTick(){
  let any = false;
  AUTO_GOLD_TIERS.forEach(tier=>{
    const st = S.autoGold[tier.key];
    if(st.unlocked && st.autoClaim && Date.now() >= st.readyAt){ collectAutoGold(tier.key); any = true; }
  });
  if(any) renderAutoGold();
}
function renderAutoGold(){
  const list = document.getElementById('autoGoldList');
  list.innerHTML = '';
  AUTO_GOLD_TIERS.forEach(tier=>{
    const st = S.autoGold[tier.key];
    const reward = autoGoldReward(tier);
    const ratePerSec = reward/(tier.cycleMs/1000);
    const rateText = `⚡ 초당 ${ratePerSec>=10?Math.round(ratePerSec):ratePerSec.toFixed(1)}💰`;
    const el = document.createElement('div');
    el.className = 'autogold-card';
    if(!st.unlocked){
      const afford = S.gold >= tier.cost;
      el.innerHTML = `<div class="ag-title">${tier.icon} ${tier.title}</div>
        <div class="ag-desc">${fmtMMSS(tier.cycleMs)}마다 골드 획득</div>
        <div class="ag-rate">${rateText}</div>
        <button class="agBtn" ${afford?'':'disabled'}>🔓 💰${tier.cost.toLocaleString()}</button>`;
      el.querySelector('.agBtn').onclick = ()=>unlockAutoGold(tier.key);
    } else if(st.autoClaim){
      el.innerHTML = `<div class="ag-title">${tier.icon} ${tier.title}</div>
        <div class="ag-desc">🤖 자동 수집 중</div>
        <div class="ag-rate">${rateText}</div>`;
    } else {
      const remain = st.readyAt - Date.now();
      const ready = remain <= 0;
      const autoCost = autoClaimCost(tier);
      const affordAuto = S.gold >= autoCost;
      el.innerHTML = `<div class="ag-title">${tier.icon} ${tier.title}</div>
        <div class="ag-desc">${ready ? '수금 준비 완료!' : fmtMMSS(remain)+' 남음'}</div>
        <div class="ag-rate">${rateText}</div>
        <button class="agBtn ${ready?'ready':''}" ${ready?'':'disabled'}>${ready ? '💰 '+reward.toLocaleString()+' 받기' : '대기 중'}</button>
        <button class="agBtn-auto" ${affordAuto?'':'disabled'}>🤖 💰${autoCost.toLocaleString()}</button>`;
      if(ready) el.querySelector('.agBtn').onclick = ()=>collectAutoGold(tier.key);
      el.querySelector('.agBtn-auto').onclick = ()=>unlockAutoClaim(tier.key);
    }
    list.appendChild(el);
  });
}

/* ========================= 저장 / 불러오기 / 오프라인 보상 ========================= */
function save(){ S.lastSave = Date.now(); localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }
function load(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    Object.assign(S, data);
    return true;
  }catch{ return false; }
}
function offlineRewards(){
  if(S.gameOver) return;
  if(S.activeMode!=='combat' || !S.combatActive) return; // 전투가 켜져있지 않았다면 방치 보상 없음
  const elapsedMs = Math.min(Date.now()-S.lastSave, 4*3600*1000);
  const seconds = elapsedMs/1000;
  if(seconds < 30) return;
  deriveStats();
  const stage = effectiveStage(S.currentZone);
  const avgEnemyHp = 15*Math.pow(1.16, stage-1)*1.3;
  const dps = S.atk*S.spd;
  const killsPerSec = dps / Math.max(avgEnemyHp,1) * 0.5;
  const goldPerKill = 2*Math.pow(1.16, stage-1)*S.goldMult;
  const xpPerKill = 1.5*Math.pow(1.16, stage-1);
  const kills = killsPerSec*seconds;
  const gained = Math.round(kills*goldPerKill);
  const xpGained = Math.round(kills*xpPerKill);
  S.gold += gained;
  gainXp(xpGained);
  const mins = Math.floor(seconds/60);
  showToast(`🕒 오프라인 ${mins}분 동안<br><b>💰 ${gained.toLocaleString()}골드</b> · <b>${xpGained}xp</b> 획득!`);
}
function showToast(html){
  const t = document.createElement('div');
  t.className='toast'; t.innerHTML=html;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(),400); }, 3200);
}

/* ========================= 메인 루프 =========================
   로직은 setInterval로 돌려 탭이 백그라운드여도 계속 진행됩니다.
   그리기는 requestAnimationFrame으로 분리(탭이 안 보이면 자동 절전, 정상). */
let heroCd=0, lastCombatTick=Date.now(), animT=0, skillCd=0;
function combatTick(){
  const now = Date.now();
  const dt = now-lastCombatTick; lastCombatTick = now;
  if(S.gameOver) return;
  if(S.activeMode==='combat' && S.combatActive){
    heroCd -= dt;
    if(enemy){ enemy.atkCd -= dt; }
    if(heroCd<=0 && enemy){ playerAttack(); heroCd = 1000/S.spd; }
    if(enemy && enemy.atkCd<=0){ enemyAttack(); enemy.atkCd = 2000 + Math.random()*700; }
  } else if(GATHER_SKILLS[S.activeMode]){
    skillCd -= dt;
    if(skillCd<=0){ doGatherAction(S.activeMode); skillCd = currentGatherItem(S.activeMode).actionMs; }
  }
}
function drawLoop(now){
  animT = now;
  drawHero(heroCtx);
  if(enemy){
    const sp = SPRITES[enemy.type];
    sp.draw(enemyCtx, sp.animated? animT : undefined);
  }
  requestAnimationFrame(drawLoop);
}

/* ========================= 초기화 ========================= */
function renderAll(){
  renderStats(); renderModeTabs(); renderZones(); renderShop(); renderPotionShop(); renderPotionBar();
  renderAutoGold(); renderPrestigeShop(); renderRebirthNowCard(); renderForge(); renderInventory(); renderAlchemy(); renderCritPotions();
  renderCombatToggle();
  document.getElementById('combatSection').hidden = S.activeMode!=='combat';
  document.getElementById('gatherSection').hidden = !GATHER_SKILLS[S.activeMode];
  document.getElementById('smithingSection').hidden = S.activeMode!=='smithing';
  document.getElementById('alchemySection').hidden = S.activeMode!=='alchemy';
  if(GATHER_SKILLS[S.activeMode]) renderSkillPanel();
}
function init(){
  const hadSave = load();
  if(!S.potions) S.potions = {small:0, medium:0, large:0};
  else ['small','medium','large'].forEach(k=>{ if(!S.potions[k]) S.potions[k]=0; });
  if(!S.autoGold || !AUTO_GOLD_TIERS.every(t=>S.autoGold[t.key])){
    S.autoGold = freshAutoGold();
  } else {
    AUTO_GOLD_TIERS.forEach(t=>{ if(typeof S.autoGold[t.key].autoClaim !== 'boolean') S.autoGold[t.key].autoClaim = false; });
    delete S.autoGold.autoClaim;
  }
  if(!S.prestige) S.prestige = {points:0, upLvl:{power:0, wealth:0, wisdom:0, vitality:0, headstart:0}};
  else PRESTIGE_UPG_DEF.forEach(u=>{ if(!S.prestige.upLvl[u.key]) S.prestige.upLvl[u.key]=0; });
  if(!S.currentZone || !S.zoneProgress){
    S.currentZone = 'forest';
    S.zoneProgress = freshZoneProgress();
  } else {
    // 새로 추가된 사냥터만 채워 넣고, 기존 진행상황은 보존
    ZONES.forEach(z=>{ if(!S.zoneProgress[z.key]) S.zoneProgress[z.key] = {killsInZone:0, subStage:1}; });
  }
  if(!S.equipment) S.equipment = {weapon:null, armor:null, accessory:null};
  if(!S.ownedGear) S.ownedGear = {};
  if(!S.skills) S.skills = { woodcutting:{level:1,xp:0}, fishing:{level:1,xp:0}, mining:{level:1,xp:0} };
  if(!S.inventory) S.inventory = {};
  else {
    if(S.inventory.logs){ S.inventory.log_normal = (S.inventory.log_normal||0)+S.inventory.logs; delete S.inventory.logs; }
    if(S.inventory.fish){ S.inventory.fish_shrimp = (S.inventory.fish_shrimp||0)+S.inventory.fish; delete S.inventory.fish; }
    if(S.inventory.ore){ S.inventory.ore_copper = (S.inventory.ore_copper||0)+S.inventory.ore; delete S.inventory.ore; }
  }
  if(!S.activeMode) S.activeMode = 'combat';
  if(typeof S.combatActive !== 'boolean') S.combatActive = false;
  if(!S.selectedTree) S.selectedTree = 'normal';
  if(!S.selectedFish) S.selectedFish = 'shrimp';
  if(!S.selectedOre) S.selectedOre = 'copper';
  if(!S.critPotionLvl) S.critPotionLvl = {woodcutting:0, fishing:0, mining:0};
  else ['woodcutting','fishing','mining'].forEach(k=>{ if(!S.critPotionLvl[k]) S.critPotionLvl[k]=0; });
  deriveStats();
  if(!S.gameOver && (S.hp<=0 || S.hp>S.maxHp)) S.hp = S.maxHp;
  spawnEnemy();
  renderAll();
  if(hadSave && !S.gameOver) offlineRewards();
  renderAll();
  if(S.gameOver) showGameOverOverlay();
  document.getElementById('goRestart').addEventListener('click', restartGame);
  document.getElementById('combatToggleBtn').addEventListener('click', toggleCombat);
  requestAnimationFrame(drawLoop);
  setInterval(combatTick, 100);
  setInterval(()=>{ autoCollectTick(); renderAutoGold(); renderRebirthNowCard(); if(S.activeMode!=='combat') renderSkillPanel(); }, 1000);
  setInterval(save, 5000);
  window.addEventListener('beforeunload', save);
  if(!hadSave) log('게임을 시작합니다. "⚔️ 전투 시작" 버튼을 눌러 전투를 시작하세요.');
}
init();
</script>
</body></html>
